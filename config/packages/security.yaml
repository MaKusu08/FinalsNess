security:
  password_hashers:
    Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: auto

  providers:
    app_user_provider:
      entity:
        class: App\Entity\User
        property: username

  firewalls:
    dev:
      pattern: ^/(_(profiler|wdt)|css|images|js)/
      security: false

    main:
      lazy: true
      provider: app_user_provider
      form_login:
        login_path: login
        check_path: login
        default_target_path: admin_dashboard
      logout:
        path: logout
        target: login

  access_control:
    # STAFF + ADMIN access
    - { path: ^/admin/movies, roles: [ROLE_ADMIN, ROLE_STAFF] }
    - { path: ^/admin/rooms, roles: [ROLE_ADMIN, ROLE_STAFF] }
    - { path: ^/admin/dashboard, roles: [ROLE_ADMIN, ROLE_STAFF] }

    - { path: ^/staff, roles: ROLE_STAFF }

    # ADMIN ONLY (must be LAST)
    - { path: ^/admin, roles: ROLE_ADMIN }