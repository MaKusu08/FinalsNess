# config/packages/security.yaml

security:

    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'
        App\Entity\User: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: username

    firewalls:

        # Disable security for dev assets
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        # =========================
        # MOBILE API LOGIN (JWT)
        # =========================
        api_login:
            pattern: ^/api/login
            stateless: true

            json_login:
                check_path: /api/login_check
                username_path: username
                password_path: password

                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure

        # =========================
        # PROTECTED API
        # =========================
        api:
            pattern: ^/api
            stateless: true
            jwt: ~

        # =========================
        # WEB LOGIN
        # =========================
        main:
            lazy: true
            provider: app_user_provider

            custom_authenticators:
                - App\Security\GoogleAuthenticator

            form_login:
                login_path: login
                check_path: login
                default_target_path: admin_dashboard

            logout:
                path: logout
                target: login

    access_control:

        # =========================
        # PUBLIC ROUTES
        # =========================
        - { path: ^/api/login_check, roles: PUBLIC_ACCESS }
        - { path: ^/api/register, roles: PUBLIC_ACCESS }
        - { path: ^/api/verify, roles: PUBLIC_ACCESS }

        - { path: ^/login, roles: PUBLIC_ACCESS }
        - { path: ^/register, roles: PUBLIC_ACCESS }

        - { path: ^/connect/google, roles: PUBLIC_ACCESS }

        # =========================
        # CUSTOMER API
        # =========================
        - { path: ^/api/customer, roles: ROLE_CUSTOMER }

        # =========================
        # STAFF ROUTES
        # =========================
        - { path: ^/staff, roles: ROLE_STAFF }

        # =========================
        # STAFF + ADMIN
        # =========================
        - { path: ^/admin/movies, roles: [ROLE_ADMIN, ROLE_STAFF] }
        - { path: ^/admin/rooms, roles: [ROLE_ADMIN, ROLE_STAFF] }
        - { path: ^/admin/dashboard, roles: [ROLE_ADMIN, ROLE_STAFF] }

        # =========================
        # ADMIN ONLY
        # =========================
        - { path: ^/admin, roles: ROLE_ADMIN }

        # =========================
        # ALL OTHER API ROUTES
        # =========================
        - { path: ^/api, roles: IS_AUTHENTICATED_FULLY }