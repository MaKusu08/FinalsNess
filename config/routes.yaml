home:
    path: /
    controller: Symfony\Bundle\FrameworkBundle\Controller\RedirectController
    defaults:
        route: login

# These routes are automatically handled by your SecurityController annotations
# but you can explicitly define them if needed:
login:
    path: /login
    controller: App\Controller\SecurityController::login

logout:
    path: /logout

controllers:
    resource: ../src/Controller/
    type: attribute

# config/routes.yaml
api_login_check:
    path: /api/login_check
    methods: ['POST']

api_register:
    path: /api/register
    controller: App\Controller\Api\AuthController::register
    methods: ['POST']

api_verify_email:
    path: /api/verify/{token}
    controller: App\Controller\Api\AuthController::verifyEmail
    methods: ['GET']

api_profile:
    path: /api/profile
    controller: App\Controller\Api\ProfileController::index
    methods: ['GET']